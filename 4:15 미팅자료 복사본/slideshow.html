<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>슬라이드쇼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .slideshow-container {
            max-width: 1000px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .media-display {
            position: relative;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            overflow: hidden;
        }

        .media-display img,
        .media-display video {
            max-width: 100%;
            max-height: 600px;
            object-fit: contain;
            display: none;
        }

        .media-display img.active,
        .media-display video.active {
            display: block;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #2a2a2a;
        }

        button {
            background: #0066ff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #0052cc;
        }

        button:active {
            transform: scale(0.95);
        }

        .counter {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            min-width: 150px;
        }

        .no-media {
            color: #888;
            text-align: center;
            padding: 100px 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="slideshow-container">
        <div class="media-display" id="mediaDisplay">
            <div class="no-media">아직 불러올 미디어가 없습니다.<br>같은 폴더에 사진/영상을 추가해주세요.</div>
        </div>

        <div class="controls">
            <button onclick="previousMedia()">← 이전</button>
            <div class="counter">
                <span id="currentIndex">0</span> / <span id="totalCount">0</span>
            </div>
            <button onclick="nextMedia()">다음 →</button>
        </div>
    </div>

    <script>
        let currentIndex = 0;
        let mediaFiles = [];

        // ★★★ 파일 이름 목록 (수정: slideshow.html 제거) ★★★
        const mediaList = [
            '0.mov',
            '1.png',
            '2.png',
            '3.png',
            '4.png',
            '5.mp4',
            '6.mov',
            '7.png',
            '8.png',
            '9.png',
            '10.mov',
            '11.png',
            '12.mov',
            '13.mp4',
            '14.png',
            '15.jpg',
            '16.mov',
            '17.mov',
            '18.mp4',
            '19.png',
            '20.mov',
            '21.png',
            '22.png',
            '23.mov',
            '24.png',
            '25.png',
            '26.mov',
            '27.jpg',
            '28.mov',
            '29.png',
            '30.png',
            '31.mov',
            '32.png',
            '33.mov',
            '34.png',
            '35.png',
            '36.png',
            '37.mov'
        ];

        function initializeSlideshow() {
            mediaFiles = mediaList.filter(file => file.length > 0);

            const mediaDisplay = document.getElementById('mediaDisplay');

            if (mediaFiles.length === 0) {
                mediaDisplay.innerHTML = '<div class="no-media">아직 불러올 미디어가 없습니다.<br>같은 폴더에 사진/영상을 추가해주세요.</div>';
                document.getElementById('totalCount').textContent = '0';
                return;
            }

            // 미디어 요소 생성
            mediaDisplay.innerHTML = '';
            mediaFiles.forEach((file, index) => {
                if (file.match(/\.(jpg|jpeg|png|gif|webp|bmp)$/i) || file.match(/^[^.]+$/) && !file.match(/\.(mp4|webm|ogg|mov|avi)$/i)) {
                    const img = document.createElement('img');
                    img.src = file;
                    img.alt = `슬라이드 ${index + 1}`;
                    img.onerror = function() {
                        console.warn(`파일을 불러올 수 없습니다: ${file}`);
                    };
                    mediaDisplay.appendChild(img);
                } else if (file.match(/\.(mp4|webm|ogg|mov|avi)$/i) || file.match(/^[0-9]+$/) && file.match(/mov|mp4/)) {
                    const video = document.createElement('video');
                    video.src = file;
                    video.controls = true;
                    video.style.maxWidth = '100%';
                    video.style.maxHeight = '600px';
                    video.onerror = function() {
                        console.warn(`파일을 불러올 수 없습니다: ${file}`);
                    };
                    mediaDisplay.appendChild(video);
                }
            });

            document.getElementById('totalCount').textContent = mediaFiles.length;
            currentIndex = 0;
            showMedia(0);
        }

        function showMedia(index) {
            if (mediaFiles.length === 0) return;

            const allMedia = document.querySelectorAll('#mediaDisplay img, #mediaDisplay video');
            allMedia.forEach(media => media.classList.remove('active'));

            if (index >= 0 && index < allMedia.length) {
                allMedia[index].classList.add('active');
                currentIndex = index;
                document.getElementById('currentIndex').textContent = index + 1;
            }
        }

        function nextMedia() {
            if (mediaFiles.length === 0) return;
            const nextIndex = (currentIndex + 1) % mediaFiles.length;
            showMedia(nextIndex);
        }

        function previousMedia() {
            if (mediaFiles.length === 0) return;
            const prevIndex = (currentIndex - 1 + mediaFiles.length) % mediaFiles.length;
            showMedia(prevIndex);
        }

        // 페이지 로드 시 슬라이드쇼 초기화
        window.addEventListener('load', initializeSlideshow);
    </script>
</body>
</html>
